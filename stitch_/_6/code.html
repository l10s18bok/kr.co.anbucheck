<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Lexend', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        h1, h2, h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col overflow-hidden">
<!-- Main Onboarding Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-between px-7 pt-12 pb-10 relative">
<!-- Header Branding (Suppressed Shell for Onboarding Focus) -->
<div class="w-full flex justify-end">
<button class="text-on-surface-variant font-label font-medium text-sm tracking-wide py-2 px-4 hover:bg-surface-container-low rounded-xl transition-colors">
                건너뛰기
            </button>
</div>
<!-- Asymmetric Illustration Area -->
<div class="relative w-full max-w-sm aspect-square flex items-center justify-center mt-4">
<!-- Background Decorative Blobs for "Digital Warmth" -->
<div class="absolute inset-0 bg-primary-fixed/30 rounded-[3rem] rotate-6 scale-95 blur-2xl"></div>
<div class="absolute inset-0 bg-secondary-fixed/20 rounded-[4rem] -rotate-3 blur-3xl"></div>
<!-- Principal Illustration Placeholder -->
<div class="relative z-10 w-full h-full flex items-center justify-center bg-surface-container-lowest rounded-[2.5rem] shadow-sm overflow-hidden">
<img alt="스마트폰을 들고 웃고 계신 어르신 일러스트" class="w-4/5 h-4/5 object-contain" data-alt="Happy senior person holding a smartphone simple line art illustration" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDsHWd1gfYDhxhpyxA7UXmVAYHU0MYi4bJa-oJ4Kh24XoKSYTxr_Bx42omuywgEil49MWaYJgZtnDHOO0o3cTKpsYvhi9q2wbxWIWD7eKen87AaJS6VVJPu4-f_2BCJje5vs-f7auge5ytK3nXOLrqZDDLOHXJYqARoOlck0wWh3Q1AJOmJZdvAC9h25_miMn5MGOsnCpaAj2nBRxsaRZNAFuobVCuwjTNbvlAQeoMrsskIspXdVEOIozdUHLgFfZ6t-q4Y14ubxMbQ"/>
</div>
</div>
<!-- Content Section: The Editorial Voice -->
<div class="w-full text-center space-y-6 mt-8">
<div class="space-y-3">
<h1 class="text-primary font-headline font-extrabold text-4xl tracking-tight leading-tight">
                    안심을 더하는<br/>일상
                </h1>
<p class="text-on-surface-variant font-body font-normal text-lg leading-relaxed max-w-[280px] mx-auto">
                    움직임과 기기 사용 여부를 확인하여 자동으로 안부를 전해드립니다.
                </p>
</div>
<!-- Page Indicator (The "Check-In" Rhythm) -->
<div class="flex justify-center items-center gap-2 pt-4">
<span class="w-8 h-2 rounded-full bg-primary"></span>
<span class="w-2 h-2 rounded-full bg-outline-variant"></span>
<span class="w-2 h-2 rounded-full bg-outline-variant"></span>
</div>
</div>
<!-- Action Section -->
<div class="w-full max-w-md mt-12">
<!-- Senior Mode Primary CTA: Gentle Guardian Style -->
<button class="group w-full h-16 bg-primary hover:bg-primary-container text-on-primary rounded-2xl font-headline font-bold text-xl flex items-center justify-center gap-3 shadow-lg shadow-primary/10 transition-all active:scale-[0.98]">
                시작하기
                <span class="material-symbols-outlined text-2xl group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
<p class="text-center mt-6 text-xs text-on-surface-variant/60 font-label">
                시작함으로써 서비스 <span class="underline">이용약관</span> 및 <span class="underline">개인정보처리방침</span>에 동의하게 됩니다.
            </p>
</div>
</main>
<!-- Background Elements for Visual Depth -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none opacity-40">
<div class="absolute top-[-10%] right-[-10%] w-[50%] h-[40%] bg-primary-fixed-dim/20 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-5%] left-[-10%] w-[60%] h-[50%] bg-secondary-fixed-dim/20 blur-[100px] rounded-full"></div>
</div>
</body></html>
