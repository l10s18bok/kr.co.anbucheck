<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Lexend:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "inverse-surface": "#2f3131",
                "on-secondary-container": "#11278e",
                "on-background": "#1a1c1c",
                "on-surface-variant": "#3d4947",
                "secondary-fixed": "#dee0ff",
                "on-primary-fixed": "#00201c",
                "primary-fixed-dim": "#67d9c9",
                "outline-variant": "#bcc9c6",
                "secondary-container": "#8596ff",
                "inverse-on-surface": "#f1f1f1",
                "primary-container": "#008377",
                "surface-dim": "#dadada",
                "secondary-fixed-dim": "#bac3ff",
                "primary-fixed": "#85f6e5",
                "tertiary-fixed-dim": "#71d7cd",
                "on-tertiary-container": "#f3fffc",
                "on-surface": "#1a1c1c",
                "on-secondary": "#ffffff",
                "on-secondary-fixed-variant": "#293ca0",
                "surface-variant": "#e2e2e2",
                "on-tertiary-fixed-variant": "#00504a",
                "surface-tint": "#006a60",
                "surface-container": "#eeeeee",
                "secondary": "#4355b9",
                "tertiary": "#006860",
                "surface-container-lowest": "#ffffff",
                "outline": "#6d7a77",
                "on-tertiary-fixed": "#00201d",
                "error-container": "#ffdad6",
                "on-error-container": "#93000a",
                "surface": "#f9f9f9",
                "on-tertiary": "#ffffff",
                "error": "#ba1a1a",
                "background": "#f9f9f9",
                "on-secondary-fixed": "#00105c",
                "tertiary-fixed": "#8ef4e9",
                "surface-container-highest": "#e2e2e2",
                "on-primary-fixed-variant": "#005048",
                "primary": "#00685e",
                "surface-container-high": "#e8e8e8",
                "on-primary": "#ffffff",
                "surface-bright": "#f9f9f9",
                "on-primary-container": "#f4fffb",
                "inverse-primary": "#67d9c9",
                "tertiary-container": "#00837a",
                "on-error": "#ffffff",
                "surface-container-low": "#f3f3f3"
              },
              fontFamily: {
                "headline": ["Plus Jakarta Sans"],
                "body": ["Lexend"],
                "label": ["Lexend"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #f9f9f9;
        }
        .headline-font {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="text-on-background antialiased">
<!-- TopAppBar Shell -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md shadow-sm dark:shadow-none">
<div class="flex items-center px-5 h-16 w-full max-w-screen-xl mx-auto relative">
<button class="text-indigo-600 dark:text-indigo-400 p-2 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 transition-colors active:scale-95 duration-200 ease-in-out rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="ml-4 font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-on-surface">대상자 연결</h1>
<div class="bg-slate-100 dark:bg-slate-800 h-[1px] w-full absolute bottom-0 left-0"></div>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-md mx-auto min-h-screen">
<!-- Editorial Header Section -->
<section class="mb-10">
<div class="w-16 h-16 bg-secondary-container rounded-2xl flex items-center justify-center mb-6 shadow-sm">
<span class="material-symbols-outlined text-on-secondary-container text-3xl" data-icon=" person_add_alt_1">person_add_alt</span>
</div>
<h2 class="headline-font text-3xl font-extrabold text-on-surface tracking-tight mb-3">연결할 대상자의 고유 코드와 별칭을 입력해주세요.</h2>
<p class="text-on-surface-variant text-base leading-relaxed">
                보호 대상자와 앱을 연결하여 실시간 건강 상태와 활동을 확인할 수 있습니다.
            </p>
</section>
<!-- Connection Form -->
<div class="space-y-8">
<!-- Field 1: Unique Code -->
<div class="group">
<label class="block headline-font text-sm font-bold text-secondary mb-3 ml-1">고유 코드 (8자리)</label>
<div class="relative">
<input class="w-full h-[64px] px-6 bg-surface-container-highest border-none rounded-xl focus:ring-2 focus:ring-secondary/20 focus:outline-none text-lg headline-font font-medium transition-all placeholder:text-outline-variant" placeholder="1234-5678" type="text"/>
<div class="absolute right-5 top-1/2 -translate-y-1/2 text-outline-variant">
<span class="material-symbols-outlined" data-icon="pin">pin</span>
</div>
</div>
<p class="mt-3 text-sm text-outline flex items-center gap-1.5 ml-1">
<span class="material-symbols-outlined text-[18px]" data-icon="info">info</span>
                    고유 코드는 대상자의 메인 화면에서 확인할 수 있습니다.
                </p>
</div>
<!-- Field 2: Nickname -->
<div class="group">
<label class="block headline-font text-sm font-bold text-secondary mb-3 ml-1">대상자 별칭</label>
<div class="relative">
<input class="w-full h-[64px] px-6 bg-surface-container-highest border-none rounded-xl focus:ring-2 focus:ring-secondary/20 focus:outline-none text-lg transition-all placeholder:text-outline-variant" placeholder="어머니, 아버지 등" type="text"/>
<div class="absolute right-5 top-1/2 -translate-y-1/2 text-outline-variant">
<span class="material-symbols-outlined" data-icon="label">label</span>
</div>
</div>
</div>
<!-- Error State Example -->
<div class="bg-error-container/40 p-4 rounded-xl flex items-start gap-3 border border-error-container">
<span class="material-symbols-outlined text-error" data-icon="error">error</span>
<div>
<p class="text-sm font-semibold text-on-error-container">코드가 올바르지 않습니다</p>
<p class="text-xs text-on-error-container/80 mt-0.5">입력하신 8자리 코드를 다시 한번 확인해주세요.</p>
</div>
</div>
<!-- Primary Action Button -->
<div class="pt-4">
<button class="w-full h-[64px] bg-secondary hover:bg-on-secondary-fixed-variant text-white rounded-xl font-bold text-lg shadow-lg shadow-secondary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="link">link</span>
                    연결하기
                </button>
</div>
</div>
<!-- Trust Visual Section (Asymmetric Bento Element) -->
</main>
<!-- BottomNavBar Shell -->
<nav class="fixed bottom-0 left-0 w-full bg-white/90 dark:bg-slate-900/90 backdrop-blur-lg border-t border-slate-100 dark:border-slate-800 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] rounded-t-[1.5rem] z-50 flex justify-around items-center px-4 pb-6 pt-3">
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-indigo-500 transition-transform active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Lexend'] text-[11px] font-medium mt-1">홈</span>
</a>
<!-- Active Tab: Connection (연결) -->
<a class="flex flex-col items-center justify-center bg-indigo-50 dark:bg-indigo-900/40 text-indigo-700 dark:text-indigo-200 rounded-2xl px-5 py-2 transition-transform active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="link" style="font-variation-settings: 'FILL' 1;">link</span>
<span class="font-['Lexend'] text-[11px] font-medium mt-1">연결</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-indigo-500 transition-transform active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
<span class="font-['Lexend'] text-[11px] font-medium mt-1">알림</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-indigo-500 transition-transform active:scale-90" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-['Lexend'] text-[11px] font-medium mt-1">설정</span>
</a>
</nav>
</body></html>
