<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Lexend:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary": "#006860",
              "surface-container-high": "#e8e8e8",
              "inverse-on-surface": "#f1f1f1",
              "surface-variant": "#e2e2e2",
              "surface-bright": "#f9f9f9",
              "background": "#f9f9f9",
              "on-tertiary-container": "#f3fffc",
              "on-secondary-fixed-variant": "#293ca0",
              "inverse-surface": "#2f3131",
              "on-background": "#1a1c1c",
              "on-secondary-fixed": "#00105c",
              "primary-fixed-dim": "#67d9c9",
              "secondary-container": "#8596ff",
              "on-tertiary-fixed": "#00201d",
              "tertiary-container": "#00837a",
              "inverse-primary": "#67d9c9",
              "surface-container": "#eeeeee",
              "surface": "#f9f9f9",
              "on-surface": "#1a1c1c",
              "surface-container-highest": "#e2e2e2",
              "on-tertiary": "#ffffff",
              "on-primary": "#ffffff",
              "on-error-container": "#93000a",
              "primary-container": "#008377",
              "on-primary-fixed-variant": "#005048",
              "primary": "#00685e",
              "secondary": "#4355b9",
              "on-primary-fixed": "#00201c",
              "outline-variant": "#bcc9c6",
              "on-secondary-container": "#11278e",
              "on-secondary": "#ffffff",
              "secondary-fixed-dim": "#bac3ff",
              "tertiary-fixed-dim": "#71d7cd",
              "secondary-fixed": "#dee0ff",
              "primary-fixed": "#85f6e5",
              "on-error": "#ffffff",
              "surface-container-low": "#f3f3f3",
              "on-tertiary-fixed-variant": "#00504a",
              "on-surface-variant": "#3d4947",
              "on-primary-container": "#f4fffb",
              "surface-tint": "#006a60",
              "surface-dim": "#dadada",
              "error-container": "#ffdad6",
              "tertiary-fixed": "#8ef4e9",
              "surface-container-lowest": "#ffffff",
              "outline": "#6d7a77",
              "error": "#ba1a1a"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Lexend"],
              "label": ["Lexend"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        font-family: 'Lexend', sans-serif;
        background-color: #f9f9f9;
        color: #1a1c1c;
      }
      .headline-font {
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface selection:bg-secondary-container">
<!-- TopAppBar -->
<nav class="flex items-center px-5 h-16 w-full max-w-none bg-white/80 dark:bg-slate-900/80 backdrop-blur-md shadow-sm dark:shadow-none docked full-width top-0 z-50">
<button class="p-2 -ml-2 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors active:scale-95 duration-200 rounded-full">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="headline-font font-bold text-lg text-indigo-700 dark:text-indigo-300 ml-2">연결 관리</h1>
</nav>
<main class="px-5 pt-8 pb-32 space-y-8">
<!-- Capacity Card (Bento Style) -->
<section class="bg-secondary p-6 rounded-[2rem] text-on-secondary shadow-lg overflow-hidden relative group">
<div class="absolute -right-10 -top-10 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
<div class="relative z-10">
<p class="text-sm font-medium opacity-80 mb-1">Guardian Mode</p>
<h2 class="headline-font text-2xl font-extrabold mb-6">관리 대상자 수 2 / 5명</h2>
<!-- Progress Indicator -->
<div class="w-full bg-white/20 h-3 rounded-full overflow-hidden mb-2">
<div class="bg-white h-full w-[40%] rounded-full"></div>
</div>
<div class="flex justify-between text-xs opacity-80 headline-font">
<span>현재 관리 중</span>
<span>최대 5명 가능</span>
</div>
</div>
</section>
<!-- Subject List Section -->
<div class="space-y-4">
<div class="flex items-end justify-between px-1">
<h3 class="headline-font font-bold text-xl text-on-surface">연결된 대상자</h3>
<span class="text-xs text-outline font-medium">관리 효율성: 최적</span>
</div>
<!-- Subject Item 1 -->
<div class="bg-surface-container-lowest p-5 rounded-2xl flex flex-col space-y-4 transition-all duration-300 hover:scale-[1.02]">
<div class="flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-14 h-14 rounded-2xl bg-secondary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-fixed text-3xl" data-icon="person_pin">person_pin</span>
</div>
<div>
<p class="headline-font font-bold text-lg text-on-surface">어머니</p>
<p class="text-sm text-outline font-mono tracking-widest">1234-5678</p>
</div>
</div>
<div class="flex gap-2">
<button class="p-3 bg-surface-container-low rounded-xl text-secondary hover:bg-secondary-container/20 transition-colors active:scale-90 duration-150">
<span class="material-symbols-outlined" data-icon="edit">edit</span>
</button>
<button class="p-3 bg-error-container/30 rounded-xl text-error hover:bg-error-container/50 transition-colors active:scale-90 duration-150">
<span class="material-symbols-outlined" data-icon="delete">delete</span>
</button>
</div>
</div>
</div>
<!-- Subject Item 2 -->
<div class="bg-surface-container-lowest p-5 rounded-2xl flex flex-col space-y-4 transition-all duration-300 hover:scale-[1.02]">
<div class="flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-14 h-14 rounded-2xl bg-secondary-fixed flex items-center justify-center">
<span class="material-symbols-outlined text-on-secondary-fixed text-3xl" data-icon="person_pin">person_pin</span>
</div>
<div>
<p class="headline-font font-bold text-lg text-on-surface">아버지</p>
<p class="text-sm text-outline font-mono tracking-widest">8765-4321</p>
</div>
</div>
<div class="flex gap-2">
<button class="p-3 bg-surface-container-low rounded-xl text-secondary hover:bg-secondary-container/20 transition-colors active:scale-90 duration-150">
<span class="material-symbols-outlined" data-icon="edit">edit</span>
</button>
<button class="p-3 bg-error-container/30 rounded-xl text-error hover:bg-error-container/50 transition-colors active:scale-90 duration-150">
<span class="material-symbols-outlined" data-icon="delete">delete</span>
</button>
</div>
</div>
</div>
</div>
<!-- Add Button -->
<button class="w-full h-16 bg-surface-container-low border-2 border-dashed border-outline-variant rounded-2xl flex items-center justify-center gap-3 text-on-surface-variant hover:border-secondary hover:text-secondary transition-all active:scale-95">
<span class="material-symbols-outlined" data-icon="person_add">person_add</span>
<span class="headline-font font-bold">+ 새로운 대상자 추가</span>
</button>
<!-- Warning Context -->
<div class="bg-error-container/10 p-4 rounded-xl flex gap-3 border border-error-container/20">
<span class="material-symbols-outlined text-error shrink-0" data-icon="warning">warning</span>
<p class="text-xs text-on-error-container/80 leading-relaxed">
                연결 해제 시 해당 대상자의 건강 데이터 및 위치 정보를 더 이상 실시간으로 확인할 수 없게 됩니다. 중요한 결정이므로 신중하게 진행해 주세요.
            </p>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-3 bg-white/90 dark:bg-slate-900/90 backdrop-blur-lg border-t border-slate-100 dark:border-slate-800 shadow-[0px_-4px_20px_rgba(0,0,0,0.04)] rounded-t-[1.5rem]">
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-indigo-500 dark:hover:text-indigo-300 active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined mb-1" data-icon="home">home</span>
<span class="font-['Lexend'] text-xs font-medium">홈</span>
</div>
<div class="flex flex-col items-center justify-center bg-indigo-50 dark:bg-indigo-900/40 text-indigo-700 dark:text-indigo-200 rounded-2xl px-5 py-2 active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined mb-1" data-icon="link" style="font-variation-settings: 'FILL' 1;">link</span>
<span class="font-['Lexend'] text-xs font-medium">연결</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-indigo-500 dark:hover:text-indigo-300 active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined mb-1" data-icon="notifications">notifications</span>
<span class="font-['Lexend'] text-xs font-medium">알림</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 px-5 py-2 hover:text-indigo-500 dark:hover:text-indigo-300 active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined mb-1" data-icon="settings">settings</span>
<span class="font-['Lexend'] text-xs font-medium">설정</span>
</div>
</nav>
</body></html>
