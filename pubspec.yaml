name: anbucheck
description: "A new Flutter project."
publish_to: 'none'

version: 1.1.9+29

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.6.6
  dio: ^5.7.0
  flutter_screenutil: ^5.9.3
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  url_launcher: ^6.3.1
  battery_plus: ^6.2.1
  connectivity_plus: ^6.1.4
  permission_handler: ^11.3.1
  flutter_native_contact_picker: ^0.0.9
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1
  shared_preferences: ^2.5.3
  sqflite: ^2.4.0
  share_plus: ^12.0.1
  pedometer_2: ^5.0.4
  screen_state:
    path: ./packages/screen_state
  device_info_plus: ^12.3.0
  timezone: ^0.9.4
  flutter_timezone: ^3.0.0
  workmanager: ^0.9.0+3
  package_info_plus: ^9.0.1
  flutter_native_splash: ^2.4.7
  lottie: ^3.3.2
  flutter_svg: ^2.0.17
  google_mobile_ads: ^5.3.0
  app_tracking_transparency: ^2.0.6
  flutter_secure_storage: ^9.2.2
  geolocator: ^13.0.0
  google_maps_flutter: ^2.9.0
  fl_chart: ^0.69.0
  in_app_purchase: ^3.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.4

# path_provider_foundation 2.6.0부터 Dart native assets(objective_c)로 전환되며
# objective_c.framework가 추가됐는데, 이 framework는 Xcode/CocoaPods가 아닌
# native_toolchain_c(clang)로 빌드돼 (1) dSYM이 아카이브에 안 들어가 TestFlight
# 업로드 시 "Upload Symbols Failed" 경고가 매번 발생하고, (2) 시뮬레이터 빌드 병행 시
# 시뮬레이터 슬라이스가 아카이브에 오염되는 문제가 있다.
# 2.5.1은 순수 Swift/CocoaPods 구현이라 두 문제가 모두 없으므로 핀한다.
# upstream 수정(https://github.com/flutter/flutter/issues/172807) 전까지 임시 유지.
dependency_overrides:
  path_provider_foundation: 2.5.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#E8F5E9"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#E8F5E9"
  android_12:
    color: "#E8F5E9"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icon/
    - assets/lottie/
    - assets/illustrations/
